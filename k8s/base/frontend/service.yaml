apiVersion: v1
kind: Service
metadata:
  name: nimbus-frontend
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nimbus-frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
