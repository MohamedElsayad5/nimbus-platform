apiVersion: v1
kind: Service
metadata:
  name: nimbus-mysql
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nimbus-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
