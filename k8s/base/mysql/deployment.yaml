apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbus-mysql
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1    # MySQL مش بيتعمل scale horizontally بسهولة
  selector:
    matchLabels:
      app.kubernetes.io/name: nimbus-mysql
  strategy:
    type: Recreate    # مش RollingUpdate لأن الـ PVC بيتربط بـ pod واحد بس
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbus-mysql
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsUser: 999    # mysql user
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: mysql
          image: mysql:8.0.36
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbus-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "nimbus"
            - name: MYSQL_USER
              value: "nimbus"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbus-mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mysql
                - -u
                - nimbus
                - -pnimbus123
                - -e
                - "SELECT 1"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: nimbus-mysql-pvc
