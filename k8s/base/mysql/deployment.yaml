apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbus-mysql
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: argocd

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: nimbus-mysql

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbus-mysql
        app.kubernetes.io/component: database

    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: mysql
        image: mysql:8.0.36
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3306
          name: mysql

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nimbus-mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_DATABASE
          value: nimbus

        - name: MYSQL_USER
          value: nimbus

        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nimbus-mysql-secret
              key: MYSQL_PASSWORD

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        startupProbe:
          tcpSocket:
            port: 3306
          periodSeconds: 10
          failureThreshold: 30

        readinessProbe:
          tcpSocket:
            port: 3306
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        livenessProbe:
          tcpSocket:
            port: 3306
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: nimbus-mysql-pvc