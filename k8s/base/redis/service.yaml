apiVersion: v1
kind: Service
metadata:
  name: nimbus-redis
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nimbus-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
