# ServiceAccount بتربط الـ pod بالـ GCP Service Account عن طريق Workload Identity
# الـ pod مش محتاج key file — بيتعرف على نفسه أوتوماتيك
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nimbus-app
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-app
    app.kubernetes.io/managed-by: argocd
  annotations:
    # ده الـ annotation المهم — بيربط الـ KSA بالـ GCP SA
    iam.gke.io/gcp-service-account: nimbus-app@nimbus-platform-500801.iam.gserviceaccount.com
automountServiceAccountToken: true
