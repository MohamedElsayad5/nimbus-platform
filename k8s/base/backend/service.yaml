# Service: بيعمل load balancer داخلي للـ backend pods
# أي حاجة جوه الـ cluster تقدر تكلم الـ backend على nimbus-backend:8080
apiVersion: v1
kind: Service
metadata:
  name: nimbus-backend
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP    # داخلي بس — مش accessible من برا الـ cluster
  selector:
    app.kubernetes.io/name: nimbus-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
