# Secret: القيم السرية — في production بنستخدم External Secrets Operator
# أو Google Secret Manager. دلوقتي بنحط القيم manually كـ base64.
#
# عشان تعمل base64:
#   echo -n "your-password" | base64
#
# القيم دي للـ dev بس — في production لازم تكون قوية وعشوائية
apiVersion: v1
kind: Secret
metadata:
  name: nimbus-backend-secret
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: argocd
type: Opaque
data:
  # echo -n "nimbus123" | base64
  DB_PASSWORD: bmltYnVzMTIz
  # echo -n "" | base64 (Redis بدون password في dev)
  REDIS_PASSWORD: ""
  # echo -n "nimbus123" | base64
  RABBITMQ_PASSWORD: bmltYnVzMTIz
