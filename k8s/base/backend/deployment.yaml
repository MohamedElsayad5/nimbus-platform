# Deployment: أهم فايل في الـ k8s manifests
# بيحدد إزاي الـ pods بتتشغل، بتتحدث، وبتتعافى
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbus-backend
  namespace: nimbus
  labels:
    app.kubernetes.io/name: nimbus-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: argocd
  annotations:
    # ArgoCD بيستخدم الـ annotation ده يعرف إمتى يعمل sync
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  # selector بيربط الـ Deployment بالـ pods بتاعته
  selector:
    matchLabels:
      app.kubernetes.io/name: nimbus-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # بيرفع pod جديد قبل ما يوقف القديم = zero downtime
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimbus-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "latest"
      annotations:
        # Prometheus بيقرأ الـ annotations دي عشان يعرف يعمل scrape
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: nimbus-app

      # Graceful shutdown: بيدي الـ pod 30 ثانية يخلص الـ requests
      terminationGracePeriodSeconds: 30

      # Security على مستوى الـ pod كله
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532      # nonroot user في distroless
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      # PodAntiAffinity: بيضمن إن الـ 2 pods مش على نفس الـ node
      # لو node وقع، الـ replica التانية شغالة على node تاني
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nimbus-backend
                topologyKey: kubernetes.io/hostname

      # TopologySpreadConstraints: توزيع الـ pods على الـ nodes بالتساوي
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nimbus-backend

      containers:
        - name: nimbus-backend
          # الـ image tag بيتحدث أوتوماتيك من الـ CI/CD pipeline
          image: us-central1-docker.pkg.dev/nimbus-platform-500801/nimbus/backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP

          # Security على مستوى الـ container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Environment variables من الـ ConfigMap
          envFrom:
            - configMapRef:
                name: nimbus-backend-config

          # Environment variables من الـ Secret
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbus-backend-secret
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbus-backend-secret
                  key: REDIS_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nimbus-backend-secret
                  key: RABBITMQ_PASSWORD

          # Resource limits: مهم جداً على e2-small nodes
          # بدون limits، pod واحد ممكن ياكل كل الـ memory وييجي OOMKill للباقيين
          resources:
            requests:
              cpu: "100m"       # 0.1 CPU core
              memory: "256Mi"   # 256 MB RAM
            limits:
              cpu: "500m"       # 0.5 CPU core max
              memory: "512Mi"   # 512 MB RAM max

          # Startup Probe: بيدي الـ Spring Boot وقت يبدأ (بطيء في البداية)
          # بيشتغل الأول، لما ينجح بيبدأ الـ liveness و readiness
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            failureThreshold: 30    # 30 * 10s = 5 دقايق وقت للبدء
            periodSeconds: 10

          # Liveness Probe: لو فشل، Kubernetes بيعيد تشغيل الـ pod
          # بيكشف لو الـ app اتعلق (deadlock, infinite loop)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness Probe: لو فشل، Kubernetes بيوقف إرسال traffic للـ pod
          # بيكشف لو الـ app مش جاهز (DB connection مش جاهز، etc.)
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Volumes للـ temp files (لأن الـ filesystem readonly)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs

      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}

      # بيضمن إن الـ images اتسحبت قبل ما الـ pod يبدأ
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until nc -z nimbus-mysql 3306; do
                echo "MySQL not ready, waiting..."
                sleep 2
              done
              echo "MySQL is ready!"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
